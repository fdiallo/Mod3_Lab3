<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

  <link rel="stylesheet" href="styles_qr_code.css">
  <title>Frontend Mentor | QR code component</title>
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <div class="card text-bg-light text-center m-5 p-4" style="width: 18rem;">
    <img src="image-qr-code.png" class="card-img-top rounded-3 " alt="QR Code" />
    <div class="card-body">
      <p class="card-text ">Improve your front-end skills by building projects</p>
      <p class="card-text "><small class="text-body-secondary">Scan the QR code to visit Frontend Mentor and take your
          coding skills to the next level</small></p>
    </div>

  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="styles_blog_card.css">
    <title>Frontend Mentor | Blog preview card</title>
    <style>
        .attribution {
            font-size: 11px;
            text-align: center;
        }

        .attribution a {
            color: hsl(228, 45%, 44%);
        }
    </style>
</head>

<body>

    <div class="card shadow-bottom-right m-5" style="width: 18rem;">
        <img src="illustration-article.svg" class="card-img-top px-3 pt-3" alt="Description of image">
        <div class="card-body">
            <a href="#" class="btn btn-warning mb-2">Learning</a>
            <p class="card-text">Published 21 Dec 2023</p>
            <h5 class="card-title">HTML & CSS foundations</h5>
            <p class="card-text"><small class="text-body-tertiary">These languages are the backbone
                    of every website, defining structure, content, and presentation.</small></p>
        </div>

        <div class="row g-0 px-3 pb-3">
            <div class="col-md-4">
                <img src="image-avatar.webp" class="img-fluid rounded-start" alt="Avatar">
            </div>
            <div class="col-md-8">
                <div class="card-body">
                    <p class="card-text "><small class="text-body-primary">Greg Hooper</small></p>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
